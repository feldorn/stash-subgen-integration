name: Subgen
description: Generates subtitles for scenes via Subgen webhook integration
version: 3.4.1
url: https://github.com/feldorn/stash-subgen-integration
interface: raw

# Python backend script
exec:
  - python
  - "{pluginDir}/subgen-integration.py"

# UI injection
ui:
  javascript:
    - subgen-integration.js

# Plugin tasks (callable from JS)
tasks:
  - name: Generate Subtitles
    description: Generate subtitles for a scene using Subgen
    defaultArgs:
      mode: generate_subtitles
  - name: Batch Generate Subtitles (By Tag)
    description: Generate subtitles for all scenes with a specific tag
    defaultArgs:
      mode: batch_generate_subtitles

# Configuration settings
settings:
  subgenWebhookUrl:
    displayName: Subgen Webhook URL
    description: "The URL to your Subgen webhook endpoint (default: http://subgen:9000)"
    type: STRING
  debugLogging:
    displayName: Debug Logging
    description: "Enable verbose debug logging to browser console"
    type: BOOLEAN
  autoFixPipeIssues:
    displayName: Auto-fix Pipe Compatibility Issues
    description: "Automatically remux MP4 files that fail ffmpeg pipe compatibility check (recommended)"
    type: BOOLEAN
  createBackupFiles:
    displayName: Create Backup Files
    description: "Create .bak backup of original files before remuxing (for testing/safety)"
    type: BOOLEAN
  translateToEnglish:
    displayName: Translate to English
    description: "When enabled, Whisper translates any audio language to English subtitles (.eng.srt). Safe for English audio — translation of English to English is a no-op. Disable only if you want native-language subtitles (.srt)."
    type: BOOLEAN
  skipExistingSubtitles:
    displayName: Skip Existing Subtitles
    description: "Do not generate subtitles if a subtitle file already exists for the scene"
    type: BOOLEAN
  batchTagName:
    displayName: Batch Generation Tag
    description: "Tag name used for the batch generation task (e.g. 'subgen_me'). The script will process these scenes and remove the tag when done."
    type: STRING
